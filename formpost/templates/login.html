{% extends "base.html" %}
{% block title %}Login — FormPost{% endblock %}
{% block content %}
<div class="auth-box">
  <h1>⚡ FormPost</h1>
  <form method="post">
    <div class="form-group">
      <label>Email</label>
      <input name="email" type="email" placeholder="you@example.com" required autofocus>
    </div>
    <div class="form-group">
      <label>Password</label>
      <input name="password" type="password" placeholder="••••••••" required>
    </div>
    <button class="btn btn-primary" style="width:100%" type="submit">Log in</button>
  </form>
</div>
{% endblock %}
